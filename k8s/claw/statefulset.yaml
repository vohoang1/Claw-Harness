apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claw-harness
  namespace: claw-system
  labels:
    app.kubernetes.io/name: claw-harness
spec:
  serviceName: claw-harness
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: claw-harness
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claw-harness
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: claw-harness
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - claw-harness
            topologyKey: kubernetes.io/hostname
      containers:
      - name: claw-harness
        image: claw-harness:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: CLAW_NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: CLAW_NATS_URL
          value: "nats://nats.claw-system.svc.cluster.local:4222"
        - name: CLAW_TIKV_PD
          value: "pd.claw-system.svc.cluster.local:2379"
        envFrom:
        - configMapRef:
            name: claw-config
        - secretRef:
            name: claw-secrets
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: claw-harness
  namespace: claw-system
  labels:
    app.kubernetes.io/name: claw-harness
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: claw-harness
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: claw-harness-pdb
  namespace: claw-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: claw-harness
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: claw-harness
  namespace: claw-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: claw-harness
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
